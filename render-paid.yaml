# render-paid.yaml  —  Render.com PAID tier configuration
#
# Rename to render.yaml when upgrading from the free blueprint.
# Cost estimate: ~$21/mo  (2× starter web + starter worker + free DB + free Redis)
#
# Benefits over free tier:
#   ✅ Always-on (no cold starts)
#   ✅ Persistent disk (uploaded files survive restarts)
#   ✅ Celery worker (parallel pipeline processing)
#   ✅ Postgres without 30-day expiry
#   ✅ Redis with disk persistence

services:

  # ── FastAPI Web Service ────────────────────────────────────────────
  - type: web
    name: audiobook-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter          # $7/mo — always-on, 512 MB RAM
    region: oregon
    healthCheckPath: /health
    disk:
      name: audiobook-storage
      mountPath: /app/storage
      sizeGB: 10           # $1.50/mo per GB
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: audiobook-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: audiobook-redis
          type: keyvalue
          property: connectionString
      - key: USE_CELERY
        value: "true"
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: MUBERT_API_KEY
        sync: false
      - key: SOUNDRAW_API_KEY
        sync: false
      - key: UPLOAD_DIR
        value: /app/storage/uploads
      - key: AUDIO_DIR
        value: /app/storage/audio
      - key: EXPORT_DIR
        value: /app/storage/exports

  # ── Celery Worker (pipeline processing) ───────────────────────────
  - type: worker
    name: audiobook-worker
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerCommand: >
      celery -A celery_app.celery_app worker
      --loglevel=info --queues=pipeline --concurrency=2
      --max-tasks-per-child=10
    plan: starter          # $7/mo
    region: oregon
    disk:
      name: audiobook-worker-storage
      mountPath: /app/storage
      sizeGB: 10
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: audiobook-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: audiobook-redis
          type: keyvalue
          property: connectionString
      - key: USE_CELERY
        value: "true"
      - key: SECRET_KEY
        generateValue: true
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: MUBERT_API_KEY
        sync: false
      - key: SOUNDRAW_API_KEY
        sync: false
      - key: UPLOAD_DIR
        value: /app/storage/uploads
      - key: AUDIO_DIR
        value: /app/storage/audio
      - key: EXPORT_DIR
        value: /app/storage/exports

  # ── Redis / Key Value ──────────────────────────────────────────────
  - type: keyvalue
    name: audiobook-redis
    plan: starter          # $10/mo — persistent disk, 100 MB RAM
    region: oregon
    maxmemoryPolicy: allkeys-lru
    ipAllowList:
      - source: 0.0.0.0/0
        description: Allow all connections

databases:

  # PostgreSQL 16 — no expiry on paid plan
  - name: audiobook-db
    databaseName: audiobook
    user: audiobook
    plan: free             # free 1 GB  (upgrade to starter for 10 GB, no expiry)
    region: oregon
