# render.yaml  —  Deploy to Render.com
#
# ┌─────────────────────────────────────────────────────────────────┐
# │  FREE TIER blueprint  (no credit card required)                 │
# │  Provisions: Web service + PostgreSQL + Redis (Key Value)       │
# │  Processing runs via FastAPI BackgroundTasks (USE_CELERY=false) │
# └─────────────────────────────────────────────────────────────────┘
#
# ⚠️  FREE TIER LIMITS TO KNOW:
#   - Web service sleeps after 15 min idle (~60s cold start to wake)
#   - Postgres FREE expires after 30 days (upgrade to keep data)
#   - Redis FREE is in-memory only (data lost on restart)
#   - Only 1 free Postgres + 1 free Redis per workspace
#   - 750 free instance-hours/month (≈ 1 service running 24/7)
#   - Ephemeral filesystem (uploaded files lost on redeploy/restart)
#     → books are stored in Postgres, audio in /tmp (regenerated)
#
# DEPLOY INSTRUCTIONS (5 steps):
#   1. Go to https://render.com  →  sign in / sign up with GitHub
#   2. Click  New +  →  Blueprint
#   3. Connect your  audiobook-generator  repo  →  click  Apply
#   4. Wait ~8 min for Docker build + service start
#   5. Open audiobook-api service → Environment → set ELEVENLABS_API_KEY
#      (optional — mock mode works without it)
#
# Your live URL:  https://audiobook-api.onrender.com
#
# UPGRADE TO PAID ($7/mo starter) to remove all free-tier limits.
# See  render-paid.yaml  in this repo for the paid configuration.

services:

  # ── FastAPI Web Service (React frontend + API) ────────────────────
  - type: web
    name: audiobook-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    region: oregon
    healthCheckPath: /health
    envVars:

      # PostgreSQL — auto-injected from the database below
      - key: DATABASE_URL
        fromDatabase:
          name: audiobook-db
          property: connectionString

      # Redis (Key Value) — auto-injected from service below
      # type MUST be "keyvalue" ("redis" is deprecated per Render docs)
      - key: REDIS_URL
        fromService:
          name: audiobook-redis
          type: keyvalue
          property: connectionString

      # BackgroundTasks on free tier (no separate worker process needed)
      - key: USE_CELERY
        value: "false"

      # Render auto-generates a cryptographically secure random string
      - key: SECRET_KEY
        generateValue: true

      - key: DEBUG
        value: "false"

      # Set these manually after deploy:
      # Dashboard → audiobook-api → Environment → Add Variable
      - key: ELEVENLABS_API_KEY
        sync: false          # blank = mock mode (fully functional demo)
      - key: MUBERT_API_KEY
        sync: false
      - key: SOUNDRAW_API_KEY
        sync: false

      # Storage paths (ephemeral on free tier — data lives in Postgres)
      - key: UPLOAD_DIR
        value: /app/storage/uploads
      - key: AUDIO_DIR
        value: /app/storage/audio
      - key: EXPORT_DIR
        value: /app/storage/exports

  # ── Redis / Key Value instance ────────────────────────────────────
  # Per Render docs: type "keyvalue" must be in "services" (not "databases")
  # ipAllowList is REQUIRED for keyvalue — use 0.0.0.0/0 to allow all
  - type: keyvalue
    name: audiobook-redis
    plan: free
    region: oregon
    maxmemoryPolicy: allkeys-lru
    ipAllowList:
      - source: 0.0.0.0/0
        description: Allow all connections

# ── Managed databases ──────────────────────────────────────────────
databases:

  # PostgreSQL 16 — 1 GB storage, free (expires 30 days after creation)
  # Upgrade to basic-256mb ($7/mo) to remove the 30-day expiry limit
  - name: audiobook-db
    databaseName: audiobook
    user: audiobook
    plan: free
    region: oregon
